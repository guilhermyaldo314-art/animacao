<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Salvar a Terra</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#menu,#gameover{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

#score{
position:fixed;
top:20px;
left:20px;
font-size:28px;
display:none;
}

</style>
</head>

<body>

<div id="menu">
<h1>🌍 Salve a Terra</h1>
<button onclick="startGame()">Jogar</button>
</div>

<div id="score">Score: 0</div>

<div id="gameover" style="display:none;">
<h1>💥 A Terra Explodiu</h1>
<button onclick="restartGame()">Jogar Novamente</button>
</div>

<canvas id="game"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// CENA

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({
canvas:document.querySelector("#game")
})

renderer.setSize(window.innerWidth,window.innerHeight)

camera.position.z=20


// LUZ

const light=new THREE.PointLight(0xffffff,2)
light.position.set(10,10,10)
scene.add(light)


// TERRA

const earthGeo=new THREE.SphereGeometry(2,32,32)

const earthMat=new THREE.MeshStandardMaterial({
color:0x2266ff
})

const earth=new THREE.Mesh(earthGeo,earthMat)

scene.add(earth)


// CONTROLE MOUSE

document.addEventListener("mousemove",(e)=>{

if(!running) return

const x=(e.clientX/window.innerWidth)*2-1
const y=-(e.clientY/window.innerHeight)*2+1

earth.position.x=x*10
earth.position.y=y*6

})


// ESTRELAS

const starsGeo=new THREE.BufferGeometry()
const starVerts=[]

for(let i=0;i<5000;i++){

starVerts.push(
(Math.random()-0.5)*1000,
(Math.random()-0.5)*1000,
(Math.random()-0.5)*1000
)

}

starsGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(starVerts,3)
)

const starsMat=new THREE.PointsMaterial({color:0xffffff})

const stars=new THREE.Points(starsGeo,starsMat)

scene.add(stars)


// METEOROS

let meteors=[]
let meteorBaseSpeed=0.05

function spawnMeteor(){

if(!running) return

const geo=new THREE.SphereGeometry(1,16,16)

const mat=new THREE.MeshStandardMaterial({
color:0x777777
})

const meteor=new THREE.Mesh(geo,mat)

meteor.position.x=(Math.random()-0.5)*20
meteor.position.y=15

meteor.speed=meteorBaseSpeed+Math.random()*0.05

scene.add(meteor)

meteors.push(meteor)

}

setInterval(spawnMeteor,1800)


// MÍSSEIS

let missiles=[]

function shootMissile(target){

const geo=new THREE.CylinderGeometry(0.1,0.1,1,8)

const mat=new THREE.MeshBasicMaterial({
color:0xff0000
})

const missile=new THREE.Mesh(geo,mat)

missile.position.x=earth.position.x
missile.position.y=earth.position.y

missile.target=target

missile.speed=0.08 // BEM LENTO

scene.add(missile)

missiles.push(missile)

}


// EXPLOSÃO

let particles=[]

function createExplosion(x,y){

for(let i=0;i<200;i++){

const geo=new THREE.SphereGeometry(0.1,8,8)

const mat=new THREE.MeshBasicMaterial({
color:0xffaa00
})

const p=new THREE.Mesh(geo,mat)

p.position.set(x,y,0)

p.vx=(Math.random()-0.5)*1
p.vy=(Math.random()-0.5)*1

scene.add(p)

particles.push(p)

}

}


// COLISÃO

function collision(a,b){

const dx=a.position.x-b.position.x
const dy=a.position.y-b.position.y

const dist=Math.sqrt(dx*dx+dy*dy)

return dist<2

}


// JOGO

let score=0
let level=1
let running=false

const scoreUI=document.getElementById("score")

function startGame(){

document.getElementById("menu").style.display="none"

scoreUI.style.display="block"

running=true

}

function restartGame(){

location.reload()

}


// LOOP

function animate(){

requestAnimationFrame(animate)

if(running){

score+=0.1

level=Math.floor(score/500)+1

scoreUI.innerText="Score: "+Math.floor(score)+" | Level: "+level

meteorBaseSpeed=0.05+score*0.00005

}

earth.rotation.y+=0.01


// METEOROS

meteors.forEach((m,i)=>{

m.position.y-=m.speed

// se estiver perto da terra dispara defesa
const dx=earth.position.x-m.position.x
const dy=earth.position.y-m.position.y
const dist=Math.sqrt(dx*dx+dy*dy)

if(dist<6 && running && Math.random()<0.02){

shootMissile(m)

}

if(collision(earth,m)&&running){

running=false

createExplosion(earth.position.x,earth.position.y)

earth.visible=false

document.getElementById("gameover").style.display="block"

}

})


// MOVER MÍSSEIS

missiles.forEach((ms,mi)=>{

if(!ms.target) return

const dx=ms.target.position.x-ms.position.x
const dy=ms.target.position.y-ms.position.y

ms.position.x+=dx*0.02
ms.position.y+=dy*0.02

if(collision(ms,ms.target)){

createExplosion(ms.target.position.x,ms.target.position.y)

scene.remove(ms.target)

meteors=meteors.filter(m=>m!==ms.target)

scene.remove(ms)

missiles.splice(mi,1)

score+=20

}

})


// PARTÍCULAS

particles.forEach((p)=>{

p.position.x+=p.vx
p.position.y+=p.vy

})

stars.rotation.y+=0.0005

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
