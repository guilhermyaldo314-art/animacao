<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Space Dodger</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#score{
position:fixed;
top:20px;
left:20px;
font-size:30px;
}

#gameover{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
display:none;
}

</style>

</head>

<body>

<div id="score">Score: 0</div>
<div id="gameover">GAME OVER</div>

<canvas id="game"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({
canvas:document.querySelector("#game")
})

renderer.setSize(window.innerWidth,window.innerHeight)

camera.position.z = 20

// luz

const light = new THREE.PointLight(0xffffff,2)
light.position.set(10,10,10)
scene.add(light)


// nave

const shipGeo = new THREE.ConeGeometry(0.8,2,8)
const shipMat = new THREE.MeshStandardMaterial({color:0xff0000})

const ship = new THREE.Mesh(shipGeo,shipMat)

ship.rotation.x = Math.PI/2

scene.add(ship)


// mouse controle

document.addEventListener("mousemove",(e)=>{

const x = (e.clientX/window.innerWidth)*2-1
const y = -(e.clientY/window.innerHeight)*2+1

ship.position.x = x*10
ship.position.y = y*6

})


// meteoros

let meteors = []

function spawnMeteor(){

const geo = new THREE.SphereGeometry(1,16,16)

const mat = new THREE.MeshStandardMaterial({
color:0x888888
})

const meteor = new THREE.Mesh(geo,mat)

meteor.position.x = (Math.random()-0.5)*20
meteor.position.y = 15
meteor.speed = 0.1 + Math.random()*0.2

scene.add(meteor)

meteors.push(meteor)

}

setInterval(spawnMeteor,800)


// score

let score = 0
let gameOver = false

const scoreUI = document.getElementById("score")


// colisão

function checkCollision(a,b){

const dx = a.position.x - b.position.x
const dy = a.position.y - b.position.y

const dist = Math.sqrt(dx*dx + dy*dy)

return dist < 1.5

}


// estrelas fundo

const starsGeo = new THREE.BufferGeometry()
const starVerts = []

for(let i=0;i<5000;i++){

starVerts.push(
(Math.random()-0.5)*1000,
(Math.random()-0.5)*1000,
(Math.random()-0.5)*1000
)

}

starsGeo.setAttribute(
"position",
new THREE.Float32BufferAttribute(starVerts,3)
)

const starsMat = new THREE.PointsMaterial({color:0xffffff})

const stars = new THREE.Points(starsGeo,starsMat)

scene.add(stars)


// loop

function animate(){

requestAnimationFrame(animate)

if(!gameOver){

score += 0.1
scoreUI.innerText = "Score: " + Math.floor(score)

}

meteors.forEach((m)=>{

m.position.y -= m.speed

if(checkCollision(ship,m) && !gameOver){

gameOver = true
document.getElementById("gameover").style.display="block"

}

})

stars.rotation.y += 0.0005

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
